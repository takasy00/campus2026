:root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--sub:#64748b;--border:#e2e8f0;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#f59e0b;--purple:#7c3aed;--teal:#059669}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);max-width:640px;margin:0 auto;padding:8px;-webkit-tap-highlight-color:transparent;font-size:14px;line-height:1.5}
.hdr{background:linear-gradient(135deg,#1e3a5f,var(--blue));border-radius:16px;padding:16px;color:#fff;margin-bottom:8px}
.hdr h1{font-size:18px;font-weight:800}.hdr .s{font-size:11px;opacity:.8;margin-top:2px}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.pct{font-size:28px;font-weight:800}.pct-s{font-size:10px;opacity:.8;text-align:right}
.bar{background:rgba(255,255,255,.2);border-radius:8px;height:8px;margin-top:8px}.bar-f{background:#fff;border-radius:8px;height:8px;transition:width .3s}
.nxt{border-radius:12px;padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border:2px solid}
.nxt-d{font-size:26px;font-weight:800}
.tabs{display:flex;gap:3px;margin-bottom:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:8px 10px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;background:#f1f5f9;color:var(--sub)}
.tab.on{background:var(--blue);color:#fff}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;overflow:hidden}
.card-h{padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.card-h h3{font-size:13px;font-weight:700}.card-cnt{font-size:12px;font-weight:700;color:var(--sub)}
.card-b{padding:8px 12px;border-top:1px solid var(--border);display:none}.card-b.open{display:block}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.task{display:flex;gap:8px;padding:5px 0;cursor:pointer;align-items:flex-start}
.cb{width:18px;height:18px;border-radius:4px;border:2px solid var(--sub);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700}
.cb.ck{background:var(--green);border-color:var(--green)}
.task-t{font-size:12px;line-height:1.5}.task-t.ck{color:#94a3b8;text-decoration:line-through}
.task-time{font-size:9px;color:var(--sub);background:#f1f5f9;border-radius:4px;padding:1px 5px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.dl-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9}
.dl-row.past{opacity:.3}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.stat{border-radius:10px;padding:8px;text-align:center}
.stat-n{font-size:20px;font-weight:800}.stat-l{font-size:10px}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th,.tbl td{border:1px solid var(--border);padding:4px 6px;text-align:left}
.tbl th{background:#f1f5f9;font-weight:700}
.conflict{background:#fef2f2;color:var(--red);font-weight:700}
.ok{background:#f0fdf4;color:var(--green)}
.warn{background:#fef3c7;border:2px solid var(--orange);border-radius:10px;padding:10px;margin-bottom:8px;font-size:12px}
.rule{border-radius:10px;padding:10px;margin-bottom:8px;font-size:12px;line-height:1.8}
.footer{text-align:center;padding:14px;color:#cbd5e1;font-size:11px}
.subj{padding:4px 6px;margin-bottom:3px;border-radius:6px;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.subj-m{background:#eff6ff}.subj-t{background:#fefce8}
.tc{font-size:11px;color:var(--sub);margin-top:4px;padding:6px;background:#f8fafc;border-radius:6px;line-height:1.6}
.book{font-size:11px;padding:5px 0;border-bottom:1px solid #f8fafc;display:flex;justify-content:space-between}
</style>
</head>
