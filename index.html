.tab{flex:1;padding:7px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:#f3f4f6;color:#6b7280}
.tab.on{background:#2563eb;color:#fff}
.wk{margin-bottom:4px;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb}
.wk.done{border-color:#86efac}
.wk-hdr{padding:7px 10px;color:#fff;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.wk-title{font-size:12px;font-weight:700}.wk-date{font-size:10px;opacity:.8}
.wk-cnt{font-size:12px;font-weight:700}
.wk-body{padding:4px;display:none}.wk-body.open{display:block}
.task{display:flex;gap:6px;padding:4px;cursor:pointer;align-items:flex-start}
.cb{width:17px;height:17px;border-radius:4px;border:2px solid #6b7280;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.cb.ck{background:#16a34a;border-color:#16a34a}.cb.ck::after{content:"✓";color:#fff;font-size:11px;font-weight:700}
.task-txt{font-size:12px;line-height:1.5}
.task-txt.ck{color:#9ca3af;text-decoration:line-through}
.task-time{font-size:10px;color:#9ca3af;background:#f3f4f6;border-radius:4px;padding:1px 5px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.pri-must .cb{border-color:#dc2626}.pri-exam .cb{border-color:#7c3aed}.pri-m .cb{border-color:#3b82f6}.pri-t .cb{border-color:#f59e0b}
.dl-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f3f4f6}
.dl-d{width:38px;font-weight:800;text-align:right}.dl-past{opacity:.35}
.rule-box{border-radius:10px;padding:12px;margin-bottom:8px;font-size:13px;line-height:1.8}
.rule-green{background:#f0fdf4;border:2px solid #16a34a}.rule-red{background:#fef2f2;border:2px solid #ef4444}
.rule-title{font-weight:700;margin-bottom:4px}
.footer{text-align:center;padding:12px;color:#d1d5db;font-size:11px}
</style>

["2/7(日)C ＋II期リトライ","—","exam"],
["⚠️ 試験でAI使用＝全科目無効＋懲戒処分","—","must"],
["44単位揃っていれば画像情報処理は不要","—","high"],
["全て終了→3月卒業認定会議→通知→3/21 卒業式🎓 日本武道館","—","must"],
]}
];

let ck=JSON.parse(localStorage.getItem("gp-ck")||"{}");
let view="plan";
let openWk={};

function save(){localStorage.setItem("gp-ck",JSON.stringify(ck))}
function tog(k){ck[k]=!ck[k];save();render()}

function render(){
const $=document.getElementById("app");
const total=W.reduce((s,w)=>s+w.tasks.length,0);
const done=Object.values(ck).filter(Boolean).length;
const pct=Math.round(done/total*100);
const nxt=DL.find(d=>dTo(d.d)>0);

let h=`<div class="hdr"><div class="hdr-top"><div><h1>🎓 卒業マスタープラン</h1><div class="sub">21T047 ｜ 残44単位 ｜ 週16h</div></div><div><div class="pct">${pct}%</div><div class="pct-sub">${done}/${total}</div></div></div><div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div></div>`;

if(nxt){
h+=`<div class="dl-box" style="background:${nxt.c}12;border-color:${nxt.c}"><div><div class="dl-label" style="color:${nxt.c}">次の締切</div><div class="dl-name">${nxt.l}</div></div><div class="dl-days" style="color:${nxt.c}">${dTo(nxt.d)}日</div></div>`;
}

h+=`<div class="tabs"><button class="tab ${view==="plan"?"on":""}" onclick="view='plan';render()">週次プラン</button><button class="tab ${view==="dl"?"on":""}" onclick="view='dl';render()">締切一覧</button><button class="tab ${view==="rule"?"on":""}" onclick="view='rule';render()">ルール</button></div>`;

if(view==="rule"){
h+=`<div class="rule-box rule-green"><div class="rule-title" style="color:#166534">🔁 毎週ルーティン（週16h）</div><b>平日行き30分：</b>ニュース→政治経済/経済学/情報社会論<br><b>平日帰り30分：</b>教科書読み<br><b>平日昼15分：</b>LMS小テスト1つ<br><b>平日夜45分：</b>レポート or M科目課題<br><b>土AM 3h：</b>M科目12科目まとめ消化<br><b>日AM 3h：</b>レポート執筆 or 試験対策<br><b style="color:#dc2626">★日曜夜：12科目の提出漏れチェック！</b></div>`;
h+=`<div class="rule-box rule-red"><div class="rule-title" style="color:#dc2626">⚠️ 絶対ルール</div>• M科目の小テスト/課題を1回でも飛ばさない<br>• 試験でAI使用は絶対NG（全科目無効）<br>• 郵送レポートは〆切の5日以上前に投函<br>• レポートが書けたら3日以内に投函<br>• 形式要件を必ず確認してから投函</div>`;
}

if(view==="dl"){
DL.forEach(d=>{
const days=dTo(d.d);const past=days<=0;
h+=`<div class="dl-item ${past?"dl-past":""}"><div class="dl-d" style="font-size:${past?11:15}px;color:${d.c}">${past?"済":days+"日"}</div><div><div style="font-size:13px;font-weight:600">${d.l}</div><div style="font-size:10px;color:#9ca3af">${d.d}</div></div></div>`;
});
}

if(view==="plan"){
W.forEach((w,wi)=>{
const wD=w.tasks.filter((_,ti)=>ck[wi+"-"+ti]).length;
const all=wD===w.tasks.length;
const op=openWk[wi]!==false;
h+=`<div class="wk ${all?"done":""}"><div class="wk-hdr" style="background:${all?"#16a34a":w.c}" onclick="openWk[${wi}]=${op?"false":"true"};render()"><div><div class="wk-title">${w.t}</div><div class="wk-date">${w.w}</div></div><div class="wk-cnt">${wD}/${w.tasks.length} ${op?"▼":"▶"}</div></div>`;
h+=`<div class="wk-body ${op?"open":""}">`;
w.tasks.forEach((tk,ti)=>{
const k=wi+"-"+ti;const d=!!ck[k];
const [text,time,pri]=tk;
const pc=pri==="must"?"pri-must":pri==="exam"?"pri-exam":pri==="m"?"pri-m":"pri-t";
h+=`<div class="task ${pc}" onclick="tog('${k}')"><div class="cb ${d?"ck":""}"></div><span class="task-txt ${d?"ck":""}">${text}</span><span class="task-time">${time}</span></div>`;
});
h+=`</div></div>`;
});
}

h+=`<div class="footer">2027.3.21 日本武道館まであと${dTo("2027-03-21")}日 🎓</div>`;
$.innerHTML=h;
}
render();
</script>
</body>
</html>
