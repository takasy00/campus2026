<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<title>卒業マスタープラン v2</title>
<style>
:root{--bg:#f8fafc;--card:#fff;--tx:#1e293b;--sub:#64748b;--bdr:#e2e8f0;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--org:#f59e0b;--pur:#7c3aed;--teal:#059669}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);max-width:640px;margin:0 auto;padding:8px;font-size:14px;line-height:1.5;-webkit-tap-highlight-color:transparent}
.hd{background:linear-gradient(135deg,#1e3a5f,var(--blue));border-radius:16px;padding:14px;color:#fff;margin-bottom:8px}
.hd h1{font-size:17px;font-weight:800}.hd .s{font-size:11px;opacity:.8}
.hdr{display:flex;justify-content:space-between;align-items:center}
.pct{font-size:26px;font-weight:800}.pcts{font-size:10px;opacity:.8;text-align:right}
.bar{background:rgba(255,255,255,.2);border-radius:8px;height:7px;margin-top:8px}.barf{background:#fff;border-radius:8px;height:7px;transition:width .3s}
.nxt{border-radius:12px;padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border:2px solid}
.tabs{display:flex;gap:3px;margin-bottom:8px;overflow-x:auto;padding-bottom:2px}
.tab{padding:8px 10px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;background:#f1f5f9;color:var(--sub)}
.tab.on{background:var(--blue);color:#fff}
.cd{background:var(--card);border:1px solid var(--bdr);border-radius:12px;margin-bottom:5px;overflow:hidden}
.cdh{padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.cdh h3{font-size:13px;font-weight:700}
.cdb{padding:8px 12px;border-top:1px solid var(--bdr);display:none}.cdb.op{display:block}
.tsk{display:flex;gap:7px;padding:4px 0;cursor:pointer;align-items:flex-start}
.cb{width:18px;height:18px;border-radius:4px;border:2px solid var(--sub);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700}
.cb.ck{background:var(--green);border-color:var(--green)}
.tt{font-size:12px;line-height:1.4}.tt.ck{color:#94a3b8;text-decoration:line-through}
.tm{font-size:9px;color:var(--sub);background:#f1f5f9;border-radius:4px;padding:1px 5px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.dlr{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f1f5f9}
.dlr.p{opacity:.3}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.st{border-radius:10px;padding:8px;text-align:center}
.stn{font-size:20px;font-weight:800}.stl{font-size:10px}
.tbl{width:100%;border-collapse:collapse;font-size:11px}.tbl th,.tbl td{border:1px solid var(--bdr);padding:4px 6px}.tbl th{background:#f1f5f9;font-weight:700}
.w{background:#fef3c7;border:2px solid var(--org);border-radius:10px;padding:10px;margin-bottom:8px;font-size:12px}
.ft{text-align:center;padding:14px;color:#cbd5e1;font-size:11px}
.sb{padding:5px 8px;margin-bottom:3px;border-radius:6px;font-size:12px;display:flex;justify-content:space-between;align-items:center;gap:6px}
.sm{background:#eff6ff}.st2{background:#fefce8}
.bk{font-size:11px;padding:6px 0;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;gap:8px}
.pri-r .cb{border-color:var(--red)}.pri-p .cb{border-color:var(--pur)}.pri-b .cb{border-color:var(--blue)}.pri-o .cb{border-color:var(--org)}.pri-g .cb{border-color:var(--green)}
.ph{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;display:inline-block}
.prio{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;white-space:nowrap}
.pr-c{background:#fef2f2;color:#dc2626}.pr-h{background:#fef3c7;color:#92400e}.pr-n{background:#f1f5f9;color:#64748b}
.drem{font-size:20px;font-weight:800;text-align:right}
</style>
</head>
<body>
<div id="app"></div>

<script src="plan-i.js"></script>
<script src="plan-ii.js"></script>

<script>

const PD=[
{id:1,nm:"I期（7月試験）",c:"#2563eb",u:12,n:6,dl:"2026-06-05",exd:"2026-07-04",

  {nm:"社会学",tp:"T",slot:"B3限",h:"30-45h",pri:"c",note:"A→B / LMS / I期限定"},

 tm:{mN:2,tN:4,min:"M50+T120=170h",max:"M60+T180=240h",avg:"~200h",wk:"27h/週（GW込みで押す）"}},
{id:2,nm:"II期（9月試験）",c:"#059669",u:12,n:6,dl:"2026-08-07",exd:"2026-09-05",
 subj:[
  {nm:"DS・AI入門（必修）",tp:"M",slot:"D2限",h:"25h",pri:"c",note:"必修！4月先行開始"},
  {nm:"数理統計学",tp:"T",slot:"C3限",h:"30-45h",pri:"h",note:"全合格で受験可 / IV期C3競合"},
  {nm:"経済学",tp:"T",slot:"D1限",h:"30-45h",pri:"h",note:"LMS教材のみ / IV期D1競合"},

 ],

 tm:{mN:4,tN:2,min:"M90+T60=150h",max:"M120+T90=210h",avg:"~174h",wk:"19h/週（ギリ）"}},
{id:3,nm:"III期（12月試験）",c:"#7c3aed",u:12,n:6,dl:"2026-11-06",exd:"2026-12-05",
 subj:[
  {nm:"現代日本史",tp:"T",slot:"B2限",h:"30-45h",pri:"h",note:"A→B / I期から移動"},
  {nm:"画像情報処理",tp:"T",slot:"B1限",h:"30-45h",pri:"h",note:"III期限定"},
  {nm:"ディジタル信号処理",tp:"T",slot:"A2限",h:"30-45h",pri:"h",note:"III期限定"},
  {nm:"CA",tp:"M",slot:"B3限",h:"25h",pri:"h",note:"手書きノート持込可 / III期限定"},
  {nm:"幾何学",tp:"M",slot:"B4限",h:"25h",pri:"h",note:"III期限定"},
  {nm:"自動制御論",tp:"M",slot:"A3限",h:"25h",pri:"h",note:"III期限定"},
 ],
 ex:["12/5(土)B 1限 画像情報処理","12/5(土)B 2限 現代日本史","12/5(土)B 3限 CA","12/5(土)B 4限 幾何学","12/6(日)A 2限 ディジタル信号処理","12/6(日)A 3限 自動制御論","＋I期リトライ(OR/日本史/OS)"],
 tm:{mN:3,tN:3,min:"M68+T90=158h",max:"M90+T135=225h",avg:"~186h",wk:"21h/週（ちょい超え）"}},
{id:4,nm:"IV期（2月試験）",c:"#dc2626",u:10,n:5,dl:"2027-01-08",exd:"2027-02-06",
 subj:[
  {nm:"心理学",tp:"T",slot:"C2限",h:"30-45h",pri:"h",note:"教科書2冊 / II期から移動"},
  {nm:"情報システム",tp:"T",slot:"C3限",h:"30-45h",pri:"h",note:"IV期限定"},
  {nm:"情報社会論",tp:"M",slot:"C1限",h:"25h",pri:"h",note:"全課題合格必須"},
  {nm:"ロボティクス概論",tp:"M",slot:"D1限",h:"25h",pri:"h",note:"書店予約"},
  {nm:"生物学１",tp:"M",slot:"D6限",h:"25h",pri:"n",note:"LMSのみ"},
 ],
 ex:["2/6(土)D 1限 ロボティクス概論","2/6(土)D 6限 生物学1","2/7(日)C 1限 情報社会論","2/7(日)C 2限 心理学","2/7(日)C 3限 情報システム","＋II期リトライ"],
 tm:{mN:3,tN:2,min:"M68+T60=128h",max:"M90+T90=180h",avg:"~149h",wk:"17h/週（余裕あり）"}}
];

const BK=[
{nm:"社会学",bk:"社会学〔第3版〕 有斐閣",isbn:"9784641054011",pr:"~2,600",pd:1},
{nm:"健康支援学",bk:"新・生き方としての健康科学 有信堂",isbn:"978-4-8420-6596-0",pr:"~2,400",pd:1},
{nm:"心理学(1)",bk:"心理学研究法 第3版 有斐閣アルマ",isbn:"978-4-641-22258-8",pr:"~2,200",pd:4},
{nm:"心理学(2)",bk:"増補 オオカミ少女はいなかった 筑摩書房",isbn:"978-4-480-43269-8",pr:"~1,000",pd:4},
{nm:"人間関係論",bk:"日本語とコミュニケーション 放送大学",isbn:"978-4595315435",pr:"~2,500",pd:1},
{nm:"現代日本史",bk:"現代日本史（指定教科書）",isbn:"LMS確認",pr:"要確認",pd:3},
{nm:"数理統計学",bk:"確率統計キャンパスゼミ 改訂8版 マセマ",isbn:"978-4-86615-315-5",pr:"~2,600",pd:2},
{nm:"OS",bk:"IT Text OS 改訂2版 オーム社",isbn:"978-4-274-22156-9",pr:"~3,200",pd:1},
{nm:"情報SD",bk:"最新 情報システムの開発 実教出版",isbn:"978-4-407-30957-7",pr:"~2,800",pd:2},
{nm:"論理回路",bk:"論理回路 コロナ社",isbn:"978-4-339-01820-2",pr:"~3,000",pd:2},
{nm:"CA",bk:"コンピュータアーキテクチャ 改訂5版 オーム社",isbn:"978-4-274-22615-1",pr:"~3,400",pd:3},
{nm:"自動制御論",bk:"絵ときでわかる機械制御 第2版 オーム社",isbn:"978-4-274-22255-9",pr:"~3,000",pd:3},
{nm:"ロボティクス概論",bk:"新訂メカトロニクス 実教出版（書店予約）",isbn:"978-4-407-36469-9",pr:"~2,800",pd:4},
{nm:"画像情報処理",bk:"ディジタル画像処理 改訂第二版 CG-ARTS",isbn:"978-4-903474-64-9",pr:"~3,800",pd:3},
{nm:"情報システム",bk:"情報システム基礎 オーム社",isbn:"978-4-274-203091",pr:"~3,000",pd:4},
{nm:"化学1",bk:"理系のための基礎化学 化学同人",isbn:"978-4-7598-1055-4",pr:"~2,600",pd:2},
{nm:"ディジタル信号処理",bk:"教科書（LMS確認）",isbn:"LMS確認",pr:"要確認",pd:3},
];
const BK_FREE=["現代世界の政治経済","経済学","幾何学","生物学1","DS・AI入門","情報社会論","OR"];

// --- State ---
let ck=JSON.parse(localStorage.getItem("gp12")||"{}");
let vw="plan",os={};
function sv(){localStorage.setItem("gp12",JSON.stringify(ck))}
function tg(k){ck[k]=!ck[k];sv();rn()}
function tv(v){vw=v;rn()}
function ts(k){os[k]=!os[k];rn()}
const pc={"r":"pri-r","p":"pri-p","b":"pri-b","o":"pri-o","g":"pri-g"};
const priL={"c":["CRITICAL","pr-c"],"h":["HIGH","pr-h"],"n":["NORMAL","pr-n"]};

// 科目マッチング [検索キー, 表示ラベル]
const SJ=[
["政治経済","政経"],["[M] OS","OS"],["DS・AI","DS"],
["人間関係論","人関"],["OR","OR"],["社会学","社会"],["健康支援学","健支"],
["論理回路","論理"],["情報SD","情SD"],["化学1","化学"],
["数理統計","統計"],["経済学","経済"],
["CA ","CA"],["CA：","CA"],["CA\n","CA"],["幾何学","幾何"],["自動制御","制御"],
["画像","画像"],["信号処理","信号"],["日本史","日史"],
["ロボティクス","ロボ"],["生物学","生物"],["情報社会","情社"],
["情報システム：","情シ"],["情報システム ","情シ"],["心理学","心理"]
];
function findSJ(t){for(var i=0;i<SJ.length;i++)if(t.indexOf(SJ[i][0])>=0)return SJ[i][1];return null}
function parseH(s){if(!s)return 0;var m;if(m=s.match(/(\d+)-(\d+)\s*h/i))return(+m[1]+ +m[2])/2;if(m=s.match(/(\d+(?:\.\d+)?)\s*h/i))return+m[1];if(m=s.match(/(\d+)\s*分/))return+m[1]/60;return 0}
const SJC={};const PC={"I期":"#2563eb","II期":"#059669","III期":"#7c3aed","IV期":"#dc2626"};
PD.forEach(p=>p.subj.forEach(s=>{var lb={"オペレーションズリサーチ":"OR","OS":"OS","DS・AI入門（必修）":"DS","コンピュータアーキテクチャ":"CA","情報システムデザイン":"情SD","化学１":"化学","ロボティクス概論":"ロボ","生物学１":"生物","情報社会論":"情社","ディジタル信号処理":"信号","現代日本史":"日史","情報システム":"情シ"}[s.nm]||findSJ(s.nm)||findSJ(s.nm+"：");if(lb)SJC[lb]=p.c}))

function rn(){
const $=document.getElementById("app");
const W=[...(window.PLAN_I||[]),...(window.PLAN_II||[]),...(window.PLAN_III||[]),...(window.PLAN_IV||[])];
const tot=W.reduce((s,w)=>s+w.tk.length,0);
const dn=W.reduce((s,w,wi)=>s+w.tk.filter((_,ti)=>ck[wi+"-"+ti]).length,0);
const p=tot>0?Math.round(dn/tot*100):0;
const nx=DL.find(d=>dTo(d.d)>0);

let h=`<div class="hd"><div class="hdr"><div><h1>卒業マスタープラン v2</h1><div class="s">21T047 | 23科目46単位 | 6/6/6/5 | 週19h（I期はGWで死守）</div></div><div><div class="pct">${p}%</div><div class="pcts">${dn}/${tot}</div></div></div><div class="bar"><div class="barf" style="width:${p}%"></div></div></div>`;

if(nx){h+=`<div class="nxt" style="background:${nx.c}08;border-color:${nx.c}"><div><div style="font-size:10px;color:${nx.c};font-weight:600">次の締切</div><div style="font-size:14px;font-weight:700">${nx.l}</div></div><div style="text-align:right"><div style="font-size:24px;font-weight:800;color:${nx.c}">${dTo(nx.d)}日</div></div></div>`;}

h+=`<div class="tabs">`;
[["plan","週次"],["dash","概要"],["period","期別"],["exam","試験"],["books","教材"]].forEach(([k,l])=>{
h+=`<button class="tab ${vw===k?"on":""}" onclick="tv('${k}')">${l}</button>`;});
h+=`</div>`;

// === 週次 ===
if(vw==="plan"){
if(W.length===0){h+=`<div style="padding:20px;text-align:center;color:var(--sub)">週次データを読み込み中...<br>plan-i.js 〜 plan-iv.js が必要です</div>`}
else{
// 期別+科目別進捗を計算
const pMap={},sMap={};
W.forEach((w,wi)=>{
const pk=w.ph.replace(/[ 　].*/,"").replace(/完了|試験対策|試験|開始|レポート/g,"").trim();
if(!pMap[pk])pMap[pk]={tot:0,dn:0,c:w.c};
pMap[pk].tot+=w.tk.length;
pMap[pk].dn+=w.tk.filter((_,ti)=>ck[wi+"-"+ti]).length;
if(!sMap[pk])sMap[pk]={};
w.tk.forEach((t,ti)=>{
const sn=findSJ(t[0]);if(!sn)return;
if(!sMap[pk][sn])sMap[pk][sn]={tot:0,dn:0};
const hrs=parseH(t[1]);
sMap[pk][sn].tot+=hrs;
if(ck[wi+"-"+ti])sMap[pk][sn].dn+=hrs;
});
});
let lastPh="";
W.forEach((w,wi)=>{
const pk=w.ph.replace(/[ 　].*/,"").replace(/完了|試験対策|試験|開始|レポート/g,"").trim();
const wD=w.tk.filter((_,ti)=>ck[wi+"-"+ti]).length;
const al=wD===w.tk.length;
const op=os["w"+wi]!==false;
if(pk!==lastPh&&pMap[pk]){
const pp=pMap[pk],pPct=pp.tot>0?Math.round(pp.dn/pp.tot*100):0,pc2=PC[pk]||pp.c;
h+=`<div style="padding:6px 4px;margin:${lastPh?"8px":"0"} 0 4px">`;
h+=`<div style="display:flex;align-items:center;gap:8px"><div style="font-size:11px;font-weight:700;color:${pc2};white-space:nowrap">${pk}</div><div style="flex:1;background:#e2e8f0;border-radius:4px;height:5px"><div style="width:${pPct}%;background:${pc2};border-radius:4px;height:5px;transition:width .3s"></div></div><div style="font-size:10px;color:var(--sub);white-space:nowrap">${pp.dn}/${pp.tot} (${pPct}%)</div></div>`;
if(sMap[pk]){
h+=`<div style="display:flex;flex-wrap:wrap;gap:3px 10px;margin-top:4px">`;
Object.entries(sMap[pk]).forEach(([sn,sv])=>{
const sp=sv.tot>0?Math.round(sv.dn/sv.tot*100):0;const sc=SJC[sn]||pp.c;
h+=`<div style="display:flex;align-items:center;gap:3px;font-size:10px"><span style="font-weight:600;min-width:20px;color:${sc}">${sn}</span><div style="width:30px;background:#e2e8f0;border-radius:2px;height:3px"><div style="width:${sp}%;background:${sc};border-radius:2px;height:3px"></div></div><span style="color:var(--sub)">${sv.dn.toFixed(1)}/${sv.tot.toFixed(1)}h</span></div>`;
});
h+=`</div>`}
h+=`</div>`;
lastPh=pk;
}
h+=`<div class="cd" style="border-color:${al?"#86efac":w.c+"40"}"><div class="cdh" style="background:${al?"#16a34a":w.c};color:#fff" onclick="ts('w${wi}')"><div><h3>${w.t}</h3><div style="font-size:10px;opacity:.8">${w.w} <span class="ph" style="background:rgba(255,255,255,.2)">${w.ph}</span></div></div><div style="font-size:12px;font-weight:700">${wD}/${w.tk.length} ${op?"▼":"▶"}</div></div>`;
h+=`<div class="cdb ${op?"op":""}">`;
w.tk.forEach((t,ti)=>{
const k=wi+"-"+ti,d=!!ck[k],pr=pc[t[2]]||"";
h+=`<div class="tsk ${pr}" onclick="tg('${k}')"><div class="cb ${d?"ck":""}">${d?"✓":""}</div><span class="tt ${d?"ck":""}">${t[0]}</span><span class="tm">${t[1]}</span></div>`;});
h+=`</div></div>`});}
}

if(vw==="dash"){
h+=`<div class="g4" style="margin-bottom:8px">`;
PD.forEach(p=>{h+=`<div class="st" style="background:${p.c}10;border:2px solid ${p.c}"><div class="stn" style="color:${p.c}">${p.n}</div><div class="stl" style="color:${p.c}">${p.nm.split("（")[0]}<br>${p.u}単位</div></div>`;});
h+=`</div>`;
h+=`<div style="background:#fef2f2;border:2px solid #dc2626;border-radius:10px;padding:8px;margin-bottom:8px;font-size:12px"><strong>採点は2週間〜最大1ヶ月</strong><div style="margin-top:4px;font-size:11px">順序制約（A合格→B解禁）は早めにAを出す。I期郵送はORのみ。</div></div>`;
h+=`<div style="background:#f0fdf4;border:2px solid #16a34a;border-radius:10px;padding:8px;margin-bottom:8px;font-size:12px;text-align:center"><strong>23科目46単位で卒業（必要44→2単位バッファ）</strong></div>`;
h+=`<div style="font-size:12px;font-weight:700;margin-bottom:4px">全締切</div>`;
DL.forEach(d=>{const dy=dTo(d.d),pa=dy<=0;
h+=`<div class="dlr ${pa?"p":""}"><div style="width:36px;font-weight:800;font-size:${pa?11:14}px;color:${d.c};text-align:right">${pa?"済":dy+"日"}</div><div><div style="font-size:12px;font-weight:600">${d.l}</div><div style="font-size:10px;color:#94a3b8">${d.d}</div></div></div>`;});
}

// === 期別 ===
if(vw==="period"){
PD.forEach(p=>{
const dlD=dTo(p.dl),exD=dTo(p.exd);
const op=os["p"+p.id]!==false;
h+=`<div class="cd" style="border-color:${p.c}40"><div class="cdh" onclick="ts('p${p.id}')"><div><h3 style="color:${p.c}">${p.nm}</h3><div style="font-size:11px;color:#64748b">${p.tm.avg} | ${p.tm.wk}</div></div><div style="text-align:right"><div class="drem" style="color:${p.c}">${dlD>0?dlD+"日":"済"}</div><div style="font-size:10px;color:var(--sub)">〆切${p.dl.slice(5)}</div></div></div>`;
h+=`<div class="cdb ${op?"op":""}">`;
h+=`<div style="display:flex;gap:8px;margin-bottom:8px;font-size:11px"><div style="flex:1;background:#f8fafc;border-radius:6px;padding:6px;text-align:center"><strong>M×${p.tm.mN}</strong> 各25h</div><div style="flex:1;background:#f8fafc;border-radius:6px;padding:6px;text-align:center"><strong>T×${p.tm.tN}</strong> 各30-45h</div><div style="flex:1;background:#f8fafc;border-radius:6px;padding:6px;text-align:center">試験 <strong>${exD>0?exD+"日後":"済"}</strong></div></div>`;
p.subj.forEach(s=>{
const k="pd-"+p.id+"-"+s.nm, d=!!ck[k];
const [pl,pcl]=priL[s.pri];
const bg=s.tp==="M"?"#eff6ff":"#fefce8";
h+=`<div class="sb" style="background:${bg};cursor:pointer" onclick="tg('${k}')"><div style="display:flex;gap:7px;align-items:center;flex:1;min-width:0"><div class="cb ${d?"ck":""}" style="width:16px;height:16px">${d?"✓":""}</div><div style="min-width:0"><div style="font-weight:600;font-size:12px;${d?"color:#94a3b8;text-decoration:line-through":""}">${s.nm}</div><div style="font-size:10px;color:#64748b">${s.note}</div></div></div><div style="text-align:right;flex-shrink:0"><span class="prio ${pcl}">${pl}</span><div style="font-size:10px;color:#94a3b8;margin-top:2px">${s.slot} | ${s.h}</div></div></div>`;
});
h+=`<div style="font-size:11px;color:#64748b;margin-top:6px;padding:6px;background:#f8fafc;border-radius:6px">必要時間: ${p.tm.min} 〜 ${p.tm.max}</div>`;
h+=`<div style="font-size:12px;font-weight:700;margin-top:8px;margin-bottom:4px">試験科目</div>`;
p.ex.forEach(e=>{
if(e.startsWith("＋")){h+=`<div style="font-size:12px;padding:2px 0;color:#64748b;font-style:italic">${e}</div>`}
else{h+=`<div style="font-size:12px;padding:2px 0">${e}</div>`}});
h+=`</div></div>`;});
}

// === 試験 ===
if(vw==="exam"){
PD.forEach(p=>{
h+=`<div class="cd"><div class="cdh" style="background:${p.c};color:#fff"><h3>${p.nm}</h3></div><div class="cdb op"><table class="tbl"><tr><th>日程</th><th>科目</th></tr>`;
p.ex.forEach(e=>{
if(e.startsWith("＋")){h+=`<tr><td colspan="2" style="color:#64748b;font-style:italic">${e}</td></tr>`}
else{const pts=e.split(" ");h+=`<tr><td style="white-space:nowrap;font-size:10px">${pts.slice(0,2).join(" ")}</td><td style="font-weight:600">${pts.slice(2).join(" ")}</td></tr>`}});
h+=`</table></div></div>`;});
h+=`<div class="w"><strong>競合（I↔III / II↔IV で分散済み）</strong><div style="margin-top:6px;font-size:11px">`;
[["B1","政治経済(I) / 画像処理(III)"],["A3","人間関係論(I) / 自動制御論(III)"],["B3","社会学(I) / CA(III)"],["B4","健康支援学(I) / 幾何学(III)"],["D1","経済学(II) / ロボティクス(IV)"],["C3","数理統計学(II) / 情報システム(IV)"]].forEach(c=>{h+=`<div style="margin:2px 0"><strong>${c[0]}限:</strong> ${c[1]}</div>`;});
h+=`<div style="margin:4px 0;color:#16a34a"><strong>競合なし:</strong> 日本史(III B2) / 信号処理(III A2) / 情社論(IV C1) / 心理学(IV C2)</div></div></div>`;
}

// === 教材 ===
if(vw==="books"){
let tot=0;
h+=`<div style="padding:4px">`;
[1,2,3,4].forEach(pid=>{
const pnm=PD.find(p=>p.id===pid).nm;
const pBooks=BK.filter(b=>b.pd===pid);
if(!pBooks.length)return;
h+=`<div style="font-size:12px;font-weight:700;margin:8px 0 4px;color:${PD.find(p=>p.id===pid).c}">${pnm}</div>`;
pBooks.forEach(b=>{
const p=parseInt(b.pr.replace(/[^0-9]/g,""));if(p)tot+=p;
const k="bk-"+b.nm,d=!!ck[k];
h+=`<div class="bk" style="cursor:pointer" onclick="tg('${k}')"><div style="display:flex;gap:7px;align-items:flex-start;flex:1;min-width:0"><div class="cb ${d?"ck":""}" style="width:16px;height:16px;flex-shrink:0">${d?"✓":""}</div><div style="min-width:0"><strong style="${d?"color:#94a3b8;text-decoration:line-through":""}">${b.nm}</strong><div style="color:#64748b;font-size:10px">${b.bk}</div>${b.isbn!=="LMS確認"?`<div style="color:#94a3b8;font-size:9px">ISBN:${b.isbn}</div>`:""}</div></div><div style="font-weight:700;color:#b45309;white-space:nowrap">${b.pr}円</div></div>`;});
});
h+=`<div style="text-align:center;font-weight:700;padding:8px;background:#fef3c7;border-radius:8px;margin-top:8px;font-size:12px">概算: 約${tot.toLocaleString()}円</div>`;
h+=`<div style="margin-top:8px;font-size:11px;color:#64748b"><strong>教科書不要:</strong> ${BK_FREE.join(" / ")}</div></div>`;
}

h+=`<div class="ft">2027.3.21 卒業式まであと${dTo("2027-03-21")}日</div>`;
$.innerHTML=h;
}
rn();
</script>
